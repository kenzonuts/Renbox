name: renbok
description: RENBOK - Simpan Jejak, Bagikan Cerita. Social network for Indonesian nature lovers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  timeago: ^3.7.0
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - img/img login.png
    - img/asetlogin.png
    - img/img-minat/minat.png
    - img/logo/Logo.png
    - img/home/cardpetualangan.png
    - img/home/home.png
    - img/create/adventure.png
    - img/create/Upload.png
    - img/create/lokasi.png
    - img/create/panduan.png
